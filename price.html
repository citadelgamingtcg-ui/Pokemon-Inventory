<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Price Tool — Paragon</title>
<style>
  :root{--ink:#0D0D0F;--panel:#131316;--line:#26262B;--gold:#D4AF6A;--gold-deep:#A9813C;--silver:#B9BEC7;--serif:Georgia,'Times New Roman',serif;--green:#4caf50;--red:#e57373}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--ink);color:var(--silver);font-family:var(--serif);min-height:100dvh;padding-bottom:200px}
  header{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .logo{color:var(--gold);font-size:15px;letter-spacing:.2em}
  .session-total{text-align:right}
  .session-total .amt{color:var(--gold);font-size:20px;display:block}
  .session-total .lbl{font-size:11px;letter-spacing:.15em;color:var(--silver)}

  .search-bar{padding:14px 16px;display:flex;gap:10px}
  .search-bar input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:6px;color:var(--silver);font-family:var(--serif);font-size:16px;padding:12px 14px}
  .search-bar input:focus{outline:none;border-color:var(--gold)}
  .search-bar button{background:var(--gold);border:none;border-radius:6px;color:var(--ink);font-family:var(--serif);font-size:14px;padding:0 18px;cursor:pointer;font-weight:600}

  .results{padding:0 16px 10px}
  .result-card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
  .result-card img{width:48px;height:66px;object-fit:contain;border-radius:4px;flex-shrink:0}
  .result-card .noimg{width:48px;height:66px;display:flex;align-items:center;justify-content:center;color:var(--line);font-size:22px;flex-shrink:0}
  .result-info{flex:1;min-width:0}
  .result-name{color:var(--gold);font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .result-meta{font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .result-price{font-size:18px;color:var(--gold);font-weight:600;margin-top:4px}
  .result-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
  .add-btn{background:var(--gold);border:none;border-radius:5px;color:var(--ink);font-size:13px;padding:8px 14px;cursor:pointer;font-weight:600;white-space:nowrap}
  .add-btn:active{background:var(--gold-deep)}

  .list-section{padding:0 16px}
  .list-header{font-size:12px;letter-spacing:.3em;color:var(--gold);margin:16px 0 10px}
  .list-item{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
  .list-item .li-name{flex:1;font-size:14px;color:var(--silver);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .list-item .li-price{color:var(--gold);font-size:15px;white-space:nowrap}
  .del-btn{background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}

  .offer-bar{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--gold);padding:14px 18px 24px;z-index:20}
  .offer-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .offer-row .label{font-size:13px;letter-spacing:.15em;color:var(--silver)}
  .offer-row .value{font-size:22px;color:var(--gold)}
  .pct-btns{display:flex;gap:8px;margin-bottom:10px}
  .pct-btn{flex:1;padding:10px;border:1px solid var(--line);border-radius:5px;background:none;color:var(--silver);font-family:var(--serif);font-size:13px;cursor:pointer;transition:all .2s}
  .pct-btn.on{background:var(--gold);border-color:var(--gold);color:var(--ink)}
  .action-row{display:flex;gap:8px}
  .clear-btn{flex:1;padding:11px;border:1px solid var(--line);border-radius:5px;background:none;color:var(--silver);font-family:var(--serif);font-size:13px;cursor:pointer}
  .done-btn{flex:2;padding:11px;border:none;border-radius:5px;background:var(--gold);color:var(--ink);font-family:var(--serif);font-size:14px;letter-spacing:.1em;cursor:pointer}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:30;align-items:center;justify-content:center}
  .modal-overlay.on{display:flex}
  .modal{background:var(--panel);border:1px solid var(--gold);border-radius:10px;padding:24px;margin:20px;width:100%;max-width:400px}
  .modal h2{color:var(--gold);font-weight:400;font-size:20px;letter-spacing:.1em;margin-bottom:16px}
  .modal .summary-line{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:15px}
  .modal .summary-line:last-child{border:none;color:var(--gold);font-size:18px;margin-top:6px}
  .modal-btns{display:flex;gap:10px;margin-top:18px}
  .modal-btns button{flex:1;padding:12px;border-radius:5px;font-family:var(--serif);font-size:14px;cursor:pointer}
  .modal-btns .copy{background:none;border:1px solid var(--gold);color:var(--gold)}
  .modal-btns .close{background:var(--gold);border:none;color:var(--ink)}
  .empty-msg{text-align:center;padding:40px 20px;font-size:14px;color:var(--silver);opacity:.6}
</style>
</head>
<body>

<header>
  <span class="logo">&#9670; PARAGON</span>
  <div class="session-total">
    <span class="amt" id="hdr-total">$0.00</span>
    <span class="lbl">MARKET TOTAL</span>
  </div>
</header>

<div class="search-bar">
  <input id="q" type="search" placeholder="Card name…" autocomplete="off" autocorrect="off" spellcheck="false">
  <select id="game" style="background:var(--panel);border:1px solid var(--line);border-radius:6px;color:var(--silver);font-family:var(--serif);font-size:14px;padding:0 10px;cursor:pointer">
    <option value="pokemon">Pokémon</option>
    <option value="magic">Magic</option>
  </select>
  <button id="jp-toggle" onclick="toggleJP()" title="Japanese cards (Pokémon)" style="background:var(--panel);border:1px solid var(--line);color:var(--silver);min-width:44px">JP</button>
  <button onclick="doSearch()">GO</button>
</div>

<div class="results" id="results"></div>

<div class="list-section">
  <div class="list-header" id="list-hdr" style="display:none">PRICED LIST</div>
  <div id="list"></div>
  <div class="empty-msg" id="empty-msg">Search a card name above to start pricing.</div>
</div>

<div class="offer-bar">
  <div class="offer-row">
    <span class="label">YOUR OFFER</span>
    <span class="value" id="offer-amt">$0.00</span>
  </div>
  <div class="pct-btns">
    <button class="pct-btn" onclick="setPct(50)">50%</button>
    <button class="pct-btn" onclick="setPct(60)">60%</button>
    <button class="pct-btn on" onclick="setPct(70)">70%</button>
    <button class="pct-btn" onclick="setPct(80)">80%</button>
  </div>
  <div class="action-row">
    <button class="clear-btn" onclick="clearList()">CLEAR</button>
    <button class="done-btn" onclick="openSummary()">DONE &#9670;</button>
  </div>
</div>

<div class="modal-overlay" id="summary-modal">
  <div class="modal">
    <h2>SESSION SUMMARY</h2>
    <div id="modal-lines"></div>
    <div class="modal-btns">
      <button class="copy" onclick="copySum()">COPY</button>
      <button class="close" onclick="closeSummary()">CLOSE</button>
    </div>
  </div>
</div>

<script>
const KEY = 'AIzaSyCn85_ksPk5ND8h0VzPYJNE1xjPCsZ5Wto'; // TCGplayer public search proxy
let list = [];
let pct = 70;
let jpMode = false;

const fmt = n => '$' + (n||0).toFixed(2);
const total = () => list.reduce((s,i) => s + i.price, 0);
const offerAmt = () => total() * pct / 100;

function updateTotals(){
  document.getElementById('hdr-total').textContent = fmt(total());
  document.getElementById('offer-amt').textContent = fmt(offerAmt());
}

function setPct(p){
  pct = p;
  document.querySelectorAll('.pct-btn').forEach(b => b.classList.toggle('on', parseInt(b.textContent) === p));
  updateTotals();
}

function toggleJP(){
  jpMode = !jpMode;
  const btn = document.getElementById('jp-toggle');
  btn.style.background = jpMode ? 'var(--gold)' : 'var(--panel)';
  btn.style.color = jpMode ? 'var(--ink)' : 'var(--silver)';
  btn.style.borderColor = jpMode ? 'var(--gold)' : 'var(--line)';
  btn.title = jpMode ? 'JP mode ON — searching Japanese prices' : 'Toggle Japanese card search';
}

async function doSearch(){
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const game = document.getElementById('game').value;
  const box = document.getElementById('results');
  box.innerHTML = '<div class="empty-msg">Searching live prices…</div>';

  // MAGIC — Scryfall (works standalone, no function needed)
  if (game === 'magic') {
    try {
      const sr = await fetch('https://api.scryfall.com/cards/search?q=' + encodeURIComponent('name:/'+q+'/') + '&order=usd&dir=desc');
      const sd = await sr.json();
      if (sd.data && sd.data.length) {
        window._results = sd.data.slice(0,15).map(c => ({
          name: c.name, set: c.set_name||'', number: c.collector_number||'',
          price: parseFloat(c.prices?.usd || c.prices?.usd_foil || 0),
          img: c.image_uris?.small || c.card_faces?.[0]?.image_uris?.small || null,
          tcgId: c.purchase_uris?.tcgplayer || null, jp:false
        }));
        renderResults(window._results); return;
      }
    } catch(e){ console.warn('scryfall failed', e); }
    box.innerHTML = '<div class="empty-msg">No Magic result — enter manually below.</div>';
    showManual(q); return;
  }

  // POKEMON — dedicated /pricesearch (returns MANY results for browsing)
  try {
    const r = await fetch('/pricesearch?q=' + encodeURIComponent(q) + (jpMode ? '&jp=1' : ''));
    const d = await r.json();
    let cards = d.data || [];
    if (jpMode) { const jp = cards.filter(c => /japanese|japan|\(jp\)/i.test(c.set_name||'')); if (jp.length) cards = jp; }
    if (cards.length) { renderProxy(cards); return; }
  } catch(e){ console.warn('search failed', e); }

  // nothing found — manual entry (works for JP, sports, One Piece, anything)
  box.innerHTML = '<div class="empty-msg">No live price found — enter manually below.</div>';
  showManual(q);
}

function renderProxy(cards){
  window._results = cards.slice(0,20).map(c => ({
    name: (c.name || '').replace(/\s*-\s*\d+\/\d+.*$/, '').trim(),
    set: c.set_name || '',
    number: c.number || '',
    price: (c.market_price ?? c.low_price ?? c.median_price ?? c.mid_price) != null
           ? parseFloat(c.market_price ?? c.low_price ?? c.median_price ?? c.mid_price) : 0,
    img: c.image_url || null,
    tcgId: c.tcgplayer_id ? `https://www.tcgplayer.com/product/${c.tcgplayer_id}` : null,
    jp: jpMode && document.getElementById('game').value === 'pokemon'
  }));
  renderResults(window._results);
}

function showManual(name){
  const box = document.getElementById('results');
  box.innerHTML += `<div class="result-card">
    <div class="noimg">&#9670;</div>
    <div class="result-info">
      <div class="result-name">${esc(name)}</div>
      <div class="result-meta">Enter price manually</div>
      <input id="manual-price" type="number" step="0.01" min="0" placeholder="$0.00"
        style="margin-top:8px;width:90px;background:var(--ink);border:1px solid var(--gold);border-radius:4px;color:var(--gold);font-size:16px;padding:6px 8px;font-family:var(--serif)">
    </div>
    <div class="result-actions">
      <button class="add-btn" onclick="addManual('${esc(name).replace(/'/g,"\\'")}')">ADD</button>
    </div>
  </div>`;
}

function addManualJP(name){
  const p = parseFloat(document.getElementById('manual-price')?.value)||0;
  addItem({name, set:'Japanese', price:p, img:null, tcgId:null, jp:true});
  document.getElementById('results').innerHTML='';
  document.getElementById('q').value='';
}

function addManual(name){
  const p = parseFloat(document.getElementById('manual-price')?.value)||0;
  addItem({name, set:'Manual entry', price:p, img:null});
  document.getElementById('results').innerHTML='';
  document.getElementById('q').value='';
}

function renderResults(items){
  const box = document.getElementById('results');
  if (!items.length){
    box.innerHTML = '<div class="empty-msg">No results — try a different name or add manually.</div>';
    showManual(document.getElementById('q').value.trim());
    return;
  }
  box.innerHTML = items.map((it,i) => {
    return `<div class="result-card">
      ${it.img ? `<img src="${esc(it.img)}" alt="">` : '<div class="noimg">&#9670;</div>'}
      <div class="result-info">
        <div class="result-name">${esc(it.name||'Unknown')}</div>
        <div class="result-meta">${esc(it.set||'')}${it.number?' · #'+esc(it.number):''}</div>
        <div class="result-price">${it.price>0?fmt(it.price):'No price — add manually'}</div>
      </div>
      <div class="result-actions">
        <button class="add-btn" onclick='addFromResult(${i})'>ADD</button>
      </div>
    </div>`;
  }).join('');
}

function addFromResult(i){
  const it = window._results[i];
  addItem({name:it.name, set:it.set||'', price:it.price||0, img:it.img||null, tcgId:it.tcgId||null, searchName:it.name});
  document.getElementById('results').innerHTML='';
  document.getElementById('q').value='';
}

function addItem(item){
  item.id = Date.now();
  list.push(item);
  renderList();
  updateTotals();
}

function removeItem(id){
  list = list.filter(i => i.id !== id);
  renderList();
  updateTotals();
}

function renderList(){
  const el = document.getElementById('list');
  const hdr = document.getElementById('list-hdr');
  const empty = document.getElementById('empty-msg');
  if (!list.length){ el.innerHTML=''; hdr.style.display='none'; empty.style.display='block'; return; }
  hdr.style.display='block'; empty.style.display='none';
  el.innerHTML = list.map(i => `<div class="list-item">
    ${i.img ? `<img src="${esc(i.img)}" style="width:36px;height:50px;object-fit:contain;border-radius:3px;flex-shrink:0" alt="">` : '<div style="width:36px;height:50px;display:flex;align-items:center;justify-content:center;color:var(--line);flex-shrink:0">&#9670;</div>'}
    <span class="li-name">${i.tcgId
      ? `<a href="${esc(i.tcgId)}" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(212,175,106,.35)">${esc(i.name)}</a>`
      : esc(i.name)}${i.jp?' <span style="background:var(--silver);color:var(--ink);border-radius:3px;padding:1px 5px;font-size:10px;margin-left:4px">JP</span>':''}${i.set&&i.set!=="Japanese"?' <span style="opacity:.6;font-size:12px">— '+esc(i.set)+'</span>':''}</span>
    <span class="li-price">${fmt(i.price)}</span>
    <button class="del-btn" onclick="removeItem(${i.id})">×</button>
  </div>`).join('');
}

function clearList(){ if(!list.length||confirm('Clear the session list?')){ list=[]; renderList(); updateTotals(); }}

function openSummary(){
  if(!list.length){ alert('Add some cards first.'); return; }
  const lines = document.getElementById('modal-lines');
  lines.innerHTML = list.map(i => `<div class="summary-line"><span>${esc(i.name)}${i.jp?' <span style="font-size:10px;background:var(--silver);color:var(--ink);border-radius:3px;padding:1px 5px;margin-left:4px">JP</span>':''}</span><span>${fmt(i.price)}</span></div>`).join('')
    + `<div class="summary-line"><span>Market Total</span><span>${fmt(total())}</span></div>`
    + `<div class="summary-line"><span>Your Offer (${pct}%)</span><span>${fmt(offerAmt())}</span></div>`;
  document.getElementById('summary-modal').classList.add('on');
}

function closeSummary(){ document.getElementById('summary-modal').classList.remove('on'); }

function copySum(){
  const txt = list.map(i=>`${i.name}: ${fmt(i.price)}`).join('\n')
    + `\n\nMarket: ${fmt(total())}\nOffer (${pct}%): ${fmt(offerAmt())}`;
  navigator.clipboard?.writeText(txt).then(()=>alert('Copied!')).catch(()=>alert(txt));
}

function esc(s){ return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

document.getElementById('q').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
</script>
</body>
</html>
